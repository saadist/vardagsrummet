<svg
  width="64"
  height="64"
  viewBox="0 0 64 64"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <radialGradient id="bgGrad" cx="30%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#e9f4ff"/>
        <stop offset="100%" stop-color="#bcdcff"/>
    </radialGradient>
  </defs>
  <!-- Rounded square background -->
  <rect
    x="2"
    y="2"
    width="60"
    height="60"
    rx="12"
    ry="12"
    stroke="white"
    stroke-width="2"
    fill="url(#bgGrad)"
  />

  <!-- Inner circle -->
  <circle
    cx="32"
    cy="32"
    r="26"
    fill="#b5d6f8ff"
    opacity="0.8"
  />
</svg>
